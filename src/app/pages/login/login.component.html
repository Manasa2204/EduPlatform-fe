<div class="auth-page">
  <div class="auth-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-icon">🎓</span>
      <h1>Welcome Back</h1>
      <p>Sign in to continue learning</p>
    </div>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="your@email.com"
          required
        />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
        />
      </div>
      <button
        type="submit"
        class="btn btn-primary btn-lg full-width"
        [disabled]="loading"
      >
        {{ loading ? "Signing in..." : "Sign In →" }}
      </button>
    </form>

    <p class="switch-link">
      New here? <a routerLink="/signup">Create account</a>
    </p>
  </div>
</div>
