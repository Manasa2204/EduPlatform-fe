<div class="auth-page">
  <div class="auth-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-icon">🎓</span>
      <h1>Create Account</h1>
      <p>Join thousands of learners today</p>
    </div>
    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    <form (ngSubmit)="signup()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name" name="name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Min 6 characters" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg full-width" [disabled]="loading">
        {{ loading ? 'Creating...' : 'Create Account →' }}
      </button>
    </form>
    <p class="switch-link">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
